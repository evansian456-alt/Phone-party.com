server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Cloud Run health check
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Serve static files; fall back to index.html for SPA-style navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets – shorter duration since filenames are not content-hashed
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression (placed at server level since we're using a per-server template;
    # equivalent to http-level gzip for a single-service container)
    gzip on;
    gzip_types text/plain text/css application/javascript text/html application/json image/svg+xml;
    gzip_min_length 256;
}
